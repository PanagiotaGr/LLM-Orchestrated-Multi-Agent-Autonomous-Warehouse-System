# docker-compose.yml — Warehouse AI
#
# Brings up the backend (FastAPI + simulation) and the frontend (React via
# nginx). Both services use restart=unless-stopped so that flaky LLM provider
# transients don't take the whole demo down.

services:
  backend:
    build:
      context: ./backend
    container_name: warehouse-ai-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # LLM configuration — both keys are passed through; the parser auto-
      # detects which provider to use, and falls back to local rules if
      # neither is set.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-5}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Simulation
      NUM_ROBOTS: ${NUM_ROBOTS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8000/health\", timeout=2).status==200 else sys.exit(1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string => the dashboard infers the backend URL from the
        # browser's window.location. That works for "open in localhost"
        # but if you're exposing this on a server, set the URL explicitly:
        #   VITE_BACKEND_URL=https://api.warehouse.example.com
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
    container_name: warehouse-ai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
